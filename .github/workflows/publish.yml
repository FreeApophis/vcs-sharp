name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing: lets the job request a GitHub OIDC token
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: >
          dotnet pack VideoContactSheet/VideoContactSheet.csproj
          --configuration Release
          --no-build
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ github.workspace }}/artifacts

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key (valid ~1h).
      # Done right before the push so the key doesn't expire. Requires a Trusted Publishing
      # policy on nuget.org. NUGET_USER is your nuget.org username (profile name, not email).
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
