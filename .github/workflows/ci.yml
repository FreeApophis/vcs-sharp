name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR so quick successive pushes
# don't pile up across the 3-OS matrix.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # The CLI bundles ffmpeg via a Windows-only Content rule that copies
      # tools/ffmpeg/win-x64/*.exe (git-ignored). Fetch them so the Windows build
      # doesn't fail on the missing files. Linux/macOS skip the copy entirely.
      - name: Download ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/download-ffmpeg.ps1

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      # -warnaserror so new compiler warnings (e.g. API deprecations from a dependency
      # bump) fail the PR instead of slipping through to a release.
      - name: Build
        run: dotnet build --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
