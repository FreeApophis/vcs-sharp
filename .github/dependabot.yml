version: 2
updates:
  # NuGet dependencies (versions live in Directory.Packages.props — Central Package Management).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  # Versions of the actions used in the workflows (.github/workflows/*).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
